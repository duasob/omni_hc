model:
  backbone: "Galerkin_Transformer"
  args:
    loader: "ns"
    geotype: "structured_2D"
    task: "dynamic_autoregressive"
    space_dim: 2
    fun_dim: 10
    out_dim: 1
    n_hidden: 256
    n_heads: 8
    n_layers: 6
    mlp_ratio: 2
    dropout: 0.1
    act: "gelu"
    unified_pos: 1
    ref: 8

training:
  batch_size: 2
  num_epochs: 500
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 1.0e-5
  scheduler: "OneCycleLR"
  pct_start: 0.3
  teacher_forcing: 1

