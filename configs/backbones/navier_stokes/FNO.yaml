model:
  backbone: "FNO"
  args:
    loader: "ns"
    geotype: "structured_2D"
    task: "dynamic_autoregressive"
    teacher_forcing: 0
    space_dim: 2
    fun_dim: 10
    out_dim: 1
    n_hidden: 64
    n_heads: 8
    n_layers: 8
    modes: 12
    unified_pos: 0
    ref: 8

training:
  batch_size: 4
  num_epochs: 500
  optimizer: "adamw"
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: "StepLR"
  step_size: 100
  gamma: 0.5
  teacher_forcing: 1

