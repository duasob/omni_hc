model:
  backbone: "Galerkin_Transformer"
  args:
    loader: "elas"
    geotype: "unstructured"
    task: "steady"
    space_dim: 2
    fun_dim: 0
    out_dim: 1
    n_hidden: 128
    n_heads: 8
    n_layers: 8
    mlp_ratio: 2
    slice_num: 64
    unified_pos: 0
    ref: 8
    dropout: 0.0

training:
  batch_size: 1
  num_epochs: 500
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 1.0e-5
  scheduler: "CosineAnnealingLR"
