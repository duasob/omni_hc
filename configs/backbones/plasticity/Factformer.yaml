model:
  backbone: "Factformer"
  args:
    loader: "plas"
    geotype: "structured_2D"
    task: "dynamic_conditional"
    time_input: true
    space_dim: 2
    fun_dim: 1
    out_dim: 4
    T_out: 20
    n_hidden: 128
    n_heads: 8
    n_layers: 8
    mlp_ratio: 2
    unified_pos: 0
    ref: 8

training:
  batch_size: 4
  num_epochs: 500
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 1.0e-5
  scheduler: "OneCycleLR"
  pct_start: 0.3
  step_per_time: true
