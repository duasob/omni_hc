name: "plasticity_backbones"
description: "Plasticity dynamic-conditional runs using benchmark-specific NSL hyperparameters."
runs:
  - name: fno
    extends:
      - configs/benchmarks/plasticity/base.yaml
      - configs/backbones/plasticity/FNO.yaml
    overrides:
      data:
        ntest: 80
    tags: ["plasticity", "fno", "unconstrained"]
  - name: galerkin_transformer
    extends:
      - configs/benchmarks/plasticity/base.yaml
      - configs/backbones/plasticity/Galerkin_Transformer.yaml
    overrides:
      data:
        ntest: 80
    tags: ["plasticity", "galerkin_transformer", "unconstrained"]
  - name: gnot
    extends:
      - configs/benchmarks/plasticity/base.yaml
      - configs/backbones/plasticity/GNOT.yaml
    overrides:
      data:
        ntest: 80
    tags: ["plasticity", "gnot", "unconstrained"]
  - name: ono
    extends:
      - configs/benchmarks/plasticity/base.yaml
      - configs/backbones/plasticity/ONO.yaml
    overrides:
      data:
        ntest: 80
    tags: ["plasticity", "ono", "unconstrained"]
  - name: transolver
    extends:
      - configs/benchmarks/plasticity/base.yaml
      - configs/backbones/plasticity/Transolver.yaml
    overrides:
      data:
        ntest: 80
    tags: ["plasticity", "transolver", "unconstrained"]
