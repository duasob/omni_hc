name: darcy_transformers_dirichlet
description: "DirichletBoundaryAnsatz transformer runs using benchmark-specific hyperparameters."

runs:
  - name: galerkin_transformer
    extends:
      - configs/benchmarks/darcy/base.yaml
      - configs/backbones/darcy/Galerkin_Transformer.yaml
      - configs/constraints/dirichlet_ansatz_zero.yaml
      - configs/experiments/darcy/optuna/dirichlet_ansatz_zero.yaml
    tags: ["darcy", "galerkin_transformer", "dirichlet_ansatz_zero"]

  - name: gnot
    extends:
      - configs/benchmarks/darcy/base.yaml
      - configs/backbones/darcy/GNOT.yaml
      - configs/constraints/dirichlet_ansatz_zero.yaml
      - configs/experiments/darcy/optuna/dirichlet_ansatz_zero.yaml
    tags: ["darcy", "gnot", "dirichlet_ansatz_zero"]

  - name: factformer
    extends:
      - configs/benchmarks/darcy/base.yaml
      - configs/backbones/darcy/Factformer.yaml
      - configs/constraints/dirichlet_ansatz_zero.yaml
      - configs/experiments/darcy/optuna/dirichlet_ansatz_zero.yaml
    tags: ["darcy", "factformer", "dirichlet_ansatz_zero"]

  - name: ono
    extends:
      - configs/benchmarks/darcy/base.yaml
      - configs/backbones/darcy/ONO.yaml
      - configs/constraints/dirichlet_ansatz_zero.yaml
      - configs/experiments/darcy/optuna/dirichlet_ansatz_zero.yaml
    tags: ["darcy", "ono", "dirichlet_ansatz_zero"]

  - name: transolver
    extends:
      - configs/benchmarks/darcy/base.yaml
      - configs/backbones/darcy/Transolver.yaml
      - configs/constraints/dirichlet_ansatz_zero.yaml
      - configs/experiments/darcy/optuna/dirichlet_ansatz_zero.yaml
    tags: ["darcy", "transolver", "dirichlet_ansatz_zero"]
