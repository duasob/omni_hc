benchmark:
  name: "navier_stokes_2d"
  dataset: "NavierStokes_V1e-5_N1200_T20"
  invariant: "global_vorticity"
  geometry: "periodic_grid"

paths:
  root_dir: "data/NavierStokes_V1e-5_N1200_T20"

data:
  ntrain: 128
  ntest: 32
  T_in: 10
  T_out: 10
  downsamplex: 1
  downsampley: 1

training:
  batch_size: 4
  val_size: 16
  num_epochs: 1
  optimizer: "adamw"
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: "StepLR"
  step_size: 100
  gamma: 0.5
  teacher_forcing: 1
  seed: 42

evaluation:
  batch_size: 4
