benchmark:
  name: "plasticity_2d"
  dataset: "plas_N987_T20"
  invariant: "dynamic_forging_deformation_response"
  geometry: "structured_grid"

paths:
  root_dir: "data/plasticity"

data:
  ntrain: 900
  ntest: 80
  downsamplex: 1
  downsampley: 1
  T_out: 20
  out_dim: 4
  normalize_input: true
  normalize: false
  norm_type: "UnitTransformer"
  channel_semantics: "unverified; NSL visualizes channels 0:2 as final deformed coordinates and channels 2:4 as a final vector magnitude"
