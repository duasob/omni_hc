benchmark:
  name: "pipe_2d"
  dataset: "Pipe"
  invariant: "unconstrained_flow_response"
  geometry: "structured_grid"

paths:
  root_dir: "data/pipe"

data:
  ntrain: 32
  ntest: 8
  target_channel: 0
  downsamplex: 4
  downsampley: 4
  normalize: true
  norm_type: "UnitTransformer"

training:
  batch_size: 2
  val_size: 4
  num_epochs: 10
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 1.0e-5
  scheduler: "StepLR"
  step_size: 100
  gamma: 0.5
  seed: 42

evaluation:
  batch_size: 2
