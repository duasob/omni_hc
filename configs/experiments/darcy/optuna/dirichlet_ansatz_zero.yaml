optuna:
  direction: "minimize"
  search_space:
    training.learning_rate:
      type: "float"
      low: 1.0e-4
      high: 1.0e-2
      log: true
    training.weight_decay:
      type: "float"
      low: 1.0e-6
      high: 1.0e-4
      log: true
    constraint.distance_power:
      type: "float"
      low: 0.5
      high: 2.0
      log: false
