extends:
  - ../../benchmarks/darcy/base.yaml
  - ../../backbones/Galerkin_Transformer.yaml
  - ../../constraints/darcy_flux_fft_pad.yaml

model:
  args:
    unified_pos: 0
    task: "steady"
    loader: "darcy"
    geotype: "structured_2D"
    fun_dim: 1
    out_dim: 1
    n_hidden: 128
    n_layers: 6
    n_heads: 8
    mlp_ratio: 2
    dropout: 0.0

paths:
  output_dir: "outputs/darcy/gt_small_flux_helmholtz"

training:
  batch_size: 4
  num_epochs: 3
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 1.0e-5
  scheduler: "OneCycleLR"
  pct_start: 0.3
  seed: 42

wandb_logging:
  wandb: false
  project: "omni_hc"
  run_name: "darcy_gt_small_flux_helmholtz"
  log_every: 100
  image_log_every: 1

optuna:
  num_trials: 5
  direction: "minimize"
  save_dir: "outputs/darcy/gt_small_flux_helmholtz_optuna"
  run_name: "darcy_gt_small_flux_helmholtz"
  search_space:
    training.learning_rate:
      type: "float"
      low: 1.0e-4
      high: 5.0e-3
      log: true
    model.args.dropout:
      type: "float"
      low: 0.0
      high: 0.2
