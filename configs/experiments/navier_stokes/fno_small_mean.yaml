extends:
  - ../../backbones/FNO.yaml
  - ../../constraints/mean_correction.yaml

benchmark:
  name: "navier_stokes_2d"
  dataset: "NavierStokes_V1e-5_N1200_T20"
  invariant: "global_vorticity"
  geometry: "periodic_grid"

paths:
  root_dir: "data/NavierStokes_V1e-5_N1200_T20"
  output_dir: "outputs/navier_stokes/fno_small_mean"

data:
  ntrain: 128
  ntest: 32
  T_in: 10
  T_out: 10
  downsamplex: 1
  downsampley: 1

training:
  batch_size: 4
  val_size: 16
  num_epochs: 1
  optimizer: "adamw"
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: "StepLR"
  step_size: 100
  gamma: 0.5
  teacher_forcing: 1
  seed: 42

constraint:
  name: "mean_correction"
  mode: "post_output"

wandb_logging:
  wandb: true
  project: "omni_hc"
  run_name: "fno_small_mean"
  log_every: 100
  image_log_every: 10

optuna:
  num_trials: 2
  direction: "minimize"
  save_dir: "outputs/navier_stokes/fno_small_mean_optuna"
  run_name: "fno_small_mean"
  search_space:
    training.learning_rate:
      type: "float"
      low: 1.0e-4
      high: 5.0e-3
      log: true
    model.args.modes:
      type: "int"
      low: 8
      high: 16
      step: 2
