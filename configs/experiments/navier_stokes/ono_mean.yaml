name: "navier_stokes_ono_mean"
benchmark: "navier_stokes"
backbone: "ONO"
constraint: "mean_constraint"
budget: "debug"

overrides:
  constraint:
    mode: "latent_head"
    latent_module:
      - "blocks.-1[0]"    # x stream, last block
      - "blocks.-2[1]"    # fx stream, penultimate block
      - "blocks.-1.ln_3"  # ln_3(fx), last block
      - "blocks.-2.ln_3"  # ln_3(fx), penultimate block
    latent_dim: 512
    correction_hidden: 256
    correction_layers: 2
    correction_act: "gelu"
  wandb_logging:
    run_name: "navier_stokes_ono_mean"
