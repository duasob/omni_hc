name: "navier_stokes_ono_mean_latent_engineered"
benchmark: "navier_stokes"
backbone: "ONO"
constraint: "mean_constraint"
budget: "final"

overrides:
  constraint:
    mode: "latent_head"
    latent_module:
      - "blocks.-2[1]"    # penultimate fx/z stream
      - "blocks.-1.Attn"  # final eigenbranch attention update
      - "blocks.-1[0]"    # final eigenbranch state used to build eigenmaps
      - "blocks.-1.proj"  # raw psi/eigenfunction map before orthogonalization
      - "blocks.-1.ln_3"  # final orthogonal-mixed fx before projection
    latent_dim: 528
    correction_hidden: 512
    correction_layers: 2
    correction_act: "gelu"
  wandb_logging:
    run_name: "navier_stokes_ono_mean_latent_engineered"
