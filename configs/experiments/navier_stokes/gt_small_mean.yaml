extends:
  - ../../backbones/Galerkin_Transformer.yaml
  - ../../constraints/mean_correction.yaml

benchmark:
  name: "navier_stokes_2d"
  dataset: "NavierStokes_V1e-5_N1200_T20"
  invariant: "global_vorticity"
  geometry: "periodic_grid"

model:
  args:
    unified_pos: 0

paths:
  root_dir: "data/NavierStokes_V1e-5_N1200_T20"
  output_dir: "outputs/navier_stokes/gt_small_mean"

data:
  ntrain: 128
  ntest: 32
  T_in: 10
  T_out: 10
  downsamplex: 1
  downsampley: 1

training:
  batch_size: 2
  val_size: 16
  num_epochs: 3
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 1e-5
  scheduler: "OneCycleLR"
  pct_start: 0.3
  teacher_forcing: 1
  seed: 42

constraint:
  name: "mean_correction"
  mode: "post_output"

wandb_logging:
  wandb: false
  project: "omni_hc"
  run_name: "gt_small_mean"
  log_every: 100
  image_log_every: null

optuna:
  num_trials: 5
  direction: "minimize"
  save_dir: "outputs/navier_stokes/gt_small_mean_optuna"
  run_name: "gt_small_mean"
  search_space:
    training.learning_rate:
      type: "float"
      low: 1.0e-4
      high: 5.0e-3
      log: true
    model.args.dropout:
      type: "float"
      low: 0.0
      high: 0.2
