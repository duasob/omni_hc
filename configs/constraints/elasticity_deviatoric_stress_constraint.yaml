training:
  max_grad_norm: 1.0

constraint:
  name: "elasticity_deviatoric_stress_constraint"
  backbone_out_dim: 1
  target_out_dim: 1
  c1: 1.863e5
  c2: 9.79e3
  max_log_lambda: 0.03 # Corresponds to lambda = 1.03 and output stress of around 2k
  head_hidden_dim: 32
  head_layers: 2
  head_init_scale: 1.0e-3
  theta_bias: 0.0
  log_lambda_bias: 0.5 # init off the von Mises cusp (sigma_vm=0 at lambda=1) for better-conditioned early gradients
